<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Оплата по QR</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsqr/1.4.0/jsQR.min.js"></script>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --tg-theme-bg-color: #ffffff;
      --tg-theme-text-color: #000000;
      --tg-theme-hint-color: #999999;
      --tg-theme-link-color: #2481cc;
      --tg-theme-button-color: #2481cc;
      --tg-theme-button-text-color: #ffffff;
      --tg-theme-secondary-bg-color: #f1f1f1;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--tg-theme-bg-color);
      color: var(--tg-theme-text-color);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0;
      overflow-x: hidden;
    }

    /* Header */
    .header {
      width: 100%;
      background-color: var(--tg-theme-secondary-bg-color);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid rgba(0,0,0,0.08);
    }

    .header-icon {
      width: 36px;
      height: 36px;
      background: var(--tg-theme-button-color);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .header-icon svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: #fff;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .header-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--tg-theme-text-color);
    }

    .header-subtitle {
      font-size: 13px;
      color: var(--tg-theme-hint-color);
    }

    .version-debug {
      width: calc(100% - 40px);
      max-width: 480px;
      margin: 12px 20px 0;
      padding: 10px 12px;
      background: #fff3cd;
      border: 1px solid #f0d98a;
      border-radius: 12px;
      font-size: 12px;
      line-height: 1.4;
      word-break: break-word;
    }

    /* Main content */
    .content {
      width: 100%;
      max-width: 480px;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      flex: 1;
    }

    /* Idle illustration */
    .illustration {
      width: 140px;
      height: 140px;
      background: var(--tg-theme-secondary-bg-color);
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 12px;
    }

    .illustration svg {
      width: 80px;
      height: 80px;
      opacity: 0.35;
    }

    .idle-text {
      text-align: center;
      color: var(--tg-theme-hint-color);
      font-size: 14px;
      line-height: 1.5;
      max-width: 260px;
    }

    /* Scan button */
    .scan-btn {
      width: 100%;
      max-width: 320px;
      padding: 15px 24px;
      background: var(--tg-theme-button-color);
      color: var(--tg-theme-button-text-color);
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: opacity 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .scan-btn:active {
      opacity: 0.8;
      transform: scale(0.98);
    }

    .scan-btn svg {
      width: 22px;
      height: 22px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }

    /* Camera section */
    .camera-section {
      display: none;
      width: 100%;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .camera-section.active {
      display: flex;
    }

    .video-wrapper {
      position: relative;
      width: 100%;
      max-width: 340px;
      aspect-ratio: 1 / 1;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.15);
      border: 3px solid var(--tg-theme-button-color);
      transition: border-color 0.3s;
    }

    .video-wrapper.scanning {
      border-color: #4cd964;
      box-shadow: 0 0 0 3px rgba(76, 217, 100, 0.25), 0 4px 24px rgba(0,0,0,0.15);
    }

    #camera-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Scan line animation */
    .scan-line {
      position: absolute;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, #4cd964, transparent);
      animation: scan 2s linear infinite;
      opacity: 0.8;
    }

    @keyframes scan {
      0%   { top: 5%; }
      50%  { top: 95%; }
      100% { top: 5%; }
    }

    /* Corner markers */
    .corner {
      position: absolute;
      width: 24px;
      height: 24px;
      border-color: var(--tg-theme-button-color);
      border-style: solid;
    }
    .corner.tl { top: 10px; left: 10px; border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
    .corner.tr { top: 10px; right: 10px; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
    .corner.bl { bottom: 10px; left: 10px; border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }
    .corner.br { bottom: 10px; right: 10px; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }

    .stop-btn {
      padding: 10px 24px;
      background: transparent;
      color: var(--tg-theme-hint-color);
      border: 1.5px solid var(--tg-theme-hint-color);
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .stop-btn:active { opacity: 0.7; }

    /* Status */
    .status {
      font-size: 14px;
      color: var(--tg-theme-hint-color);
      text-align: center;
      min-height: 20px;
      padding: 0 20px;
    }

    .status.success { color: #4cd964; font-weight: 600; }
    .status.error   { color: #ff3b30; font-weight: 600; }

    /* Result card */
    .result-card {
      display: none;
      width: 100%;
      max-width: 340px;
      background: var(--tg-theme-secondary-bg-color);
      border-radius: 16px;
      padding: 18px;
      gap: 14px;
      flex-direction: column;
    }

    .result-card.visible {
      display: flex;
    }

    .result-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--tg-theme-hint-color);
      font-weight: 600;
    }

    .result-url {
      font-size: 13px;
      color: var(--tg-theme-link-color);
      word-break: break-all;
      line-height: 1.4;
    }

    .result-divider {
      height: 1px;
      background: rgba(0,0,0,0.08);
    }

    .result-status-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .result-status-icon {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .result-status-icon.ok  { background: rgba(76, 217, 100, 0.15); }
    .result-status-icon.err { background: rgba(255, 59, 48, 0.12); }

    .result-status-text {
      font-size: 15px;
      font-weight: 600;
    }

    .result-status-text.ok  { color: #4cd964; }
    .result-status-text.err { color: #ff3b30; }

    #debug-log {
      max-height: 160px;
      overflow-y: auto;
      font-size: 12px;
      background: rgba(0,0,0,0.05);
      border-radius: 10px;
      padding: 8px;
      width: 100%;
      word-break: break-word;
    }

    /* Loading spinner */
    .spinner {
      display: none;
      width: 22px;
      height: 22px;
      border: 2.5px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-icon">
    <svg viewBox="0 0 24 24">
      <rect x="3" y="3" width="7" height="7" rx="1"/>
      <rect x="14" y="3" width="7" height="7" rx="1"/>
      <rect x="3" y="14" width="7" height="7" rx="1"/>
      <circle cx="17.5" cy="17.5" r="2"/>
      <line x1="14" y1="14" x2="14" y2="14.01"/>
      <line x1="20" y1="14" x2="20" y2="14.01"/>
      <line x1="14" y1="20" x2="14" y2="20.01"/>
    </svg>
  </div>
  <div>
    <div class="header-title">Оплата по QR</div>
    <div class="header-subtitle">Система быстрых платежей</div>
  </div>
</div>

<div class="version-debug">
  <div id="version-line">VERSION: 10000</div>
  <div id="server-line">SERVER_URL: https://town-trailers-blink-relative.trycloudflare.com</div>
</div>

<!-- Main content -->
<div class="content">

  <!-- Idle state -->
  <div id="idle-section">
    <div class="illustration">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="2" width="8" height="8" rx="1.5"/>
        <rect x="14" y="2" width="8" height="8" rx="1.5"/>
        <rect x="2" y="14" width="8" height="8" rx="1.5"/>
        <rect x="4.5" y="4.5" width="3" height="3" rx="0.5" fill="currentColor" stroke="none"/>
        <rect x="16.5" y="4.5" width="3" height="3" rx="0.5" fill="currentColor" stroke="none"/>
        <rect x="4.5" y="16.5" width="3" height="3" rx="0.5" fill="currentColor" stroke="none"/>
        <line x1="14" y1="14" x2="14" y2="22"/>
        <line x1="14" y1="14" x2="22" y2="14"/>
        <line x1="22" y1="18" x2="22" y2="22"/>
        <line x1="18" y1="22" x2="22" y2="22"/>
      </svg>
    </div>
    <p class="idle-text">Наведите камеру на QR-код СБП в магазине, чтобы быстро оплатить покупку</p>
  </div>

  <!-- Scan button -->
  <button class="scan-btn" id="scanBtn">
    <svg viewBox="0 0 24 24">
      <path d="M23 7V2h-5"/>
      <path d="M1 7V2h5"/>
      <path d="M23 17v5h-5"/>
      <path d="M1 17v5h5"/>
      <line x1="7" y1="12" x2="17" y2="12"/>
    </svg>
    <span id="scan-btn-text">Сканировать QR</span>
    <div class="spinner" id="btn-spinner"></div>
  </button>
  <button class="stop-btn" id="testPayBtn" onclick="runTestPayment()">Тест оплаты</button>
  <button class="stop-btn" id="testHealthBtn" onclick="runHealthCheck()">Тест сети</button>

  <!-- Camera section -->
  <div class="camera-section" id="camera-section">
    <div class="video-wrapper" id="video-wrapper">
      <video id="camera-video" autoplay muted playsinline></video>
      <div class="scan-line"></div>
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
    </div>
    <button class="stop-btn" onclick="stopScanning()">Отмена</button>
  </div>

  <!-- Status -->
  <div class="status" id="status-text">Нажмите кнопку, чтобы начать сканирование</div>

  <!-- Result card -->
  <div class="result-card" id="result-card">
    <div class="result-label">Найденная ссылка СБП</div>
    <div class="result-url" id="result-url"></div>
    <div class="result-divider"></div>
    <div class="result-status-row">
      <div class="result-status-icon" id="result-icon"></div>
      <div class="result-status-text" id="result-status-text"></div>
    </div>
  </div>

  <div id="debug-log"></div>

</div>

<script>
  // Telegram WebApp init
  const tg = window.Telegram?.WebApp;
  if (tg) {
    tg.ready();
    tg.expand?.();
  }
  debugLog('[MINIAPP] tg exists: ' + (!!tg));
  debugLog('[MINIAPP] tg version: ' + (tg?.version ?? 'undefined'));
  debugLog('[MINIAPP] tg platform: ' + (tg?.platform ?? 'undefined'));
  debugLog('[MINIAPP] typeof showScanQrPopup: ' + typeof tg?.showScanQrPopup);
  debugLog('[MINIAPP] typeof showAlert: ' + typeof tg?.showAlert);

  // Constants
  // заменить на актуальный URL backend (cloudflared)
  const APP_VERSION = "10001";
  const SERVER_URL = "https://ict-exists-versus-famous.trycloudflare.com";
  debugLog('[MINIAPP] APP_VERSION: ' + APP_VERSION);
  debugLog('[MINIAPP] SERVER_URL: ' + SERVER_URL);
  document.getElementById('version-line').textContent = 'VERSION: ' + APP_VERSION;
  document.getElementById('server-line').textContent = 'SERVER_URL: ' + SERVER_URL;
  // DOM refs
  const scanBtn        = document.getElementById('scanBtn');
  const scanBtnText    = document.getElementById('scan-btn-text');
  const btnSpinner     = document.getElementById('btn-spinner');
  const cameraSection  = document.getElementById('camera-section');
  const videoEl        = document.getElementById('camera-video');
  const videoWrapper   = document.getElementById('video-wrapper');
  const statusText     = document.getElementById('status-text');
  const resultCard     = document.getElementById('result-card');
  const resultUrl      = document.getElementById('result-url');
  const resultIcon     = document.getElementById('result-icon');
  const resultStatus   = document.getElementById('result-status-text');
  const idleSection    = document.getElementById('idle-section');

  let stream = null;
  let scanRaf = null;
  let scanBusy = false;
  let fallbackActive = false;
  let barcodeDetector = null;
  let fallbackCanvas = null;
  let fallbackCtx = null;

  // UI helpers
  function setStatus(msg, cls = '') {
    statusText.textContent = msg;
    statusText.className = 'status ' + cls;
  }

  function debugLog(msg) {
    const el = document.getElementById('debug-log');
    if (!el) return;
    const row = document.createElement('div');
    row.textContent = msg;
    el.prepend(row);
  }

  function showResult(url, success, message) {
    resultUrl.textContent = url;
    resultCard.classList.add('visible');

    if (success) {
      resultIcon.className = 'result-status-icon ok';
      resultIcon.textContent = '✅';
      resultStatus.className = 'result-status-text ok';
      resultStatus.textContent = message;
    } else {
      resultIcon.className = 'result-status-icon err';
      resultIcon.textContent = '❌';
      resultStatus.className = 'result-status-text err';
      resultStatus.textContent = message;
    }
  }

  function setBtnLoading(loading) {
    btnSpinner.style.display = loading ? 'block' : 'none';
    scanBtnText.textContent  = loading ? 'Обработка...' : 'Сканировать снова';
    scanBtn.disabled         = loading;
  }

  function stopFallbackScanner() {
    fallbackActive = false;
    cancelAnimationFrame(scanRaf);
    scanRaf = null;
    scanBusy = false;

    if (stream) {
      stream.getTracks().forEach((track) => track.stop());
      stream = null;
    }

    videoEl.srcObject = null;
    videoWrapper.classList.remove('scanning');
  }

  function scanLoop() {
    if (!fallbackActive) return;

    scanRaf = requestAnimationFrame(scanLoop);

    if (scanBusy) return;
    scanBusy = true;

    try {
      scanWithJsQr();
    } finally {
      scanBusy = false;
    }
  }

  function scanBarcodeLoop() {
    if (!fallbackActive || !barcodeDetector) return;

    scanRaf = requestAnimationFrame(scanBarcodeLoop);

    if (scanBusy) return;
    scanBusy = true;

    try {
      scanWithBarcodeDetector();
    } finally {
      scanBusy = false;
    }
  }

  function onQrDetected(qrText) {
    if (!qrText || !fallbackActive) return;

    debugLog('[MINIAPP] QR detected: ' + qrText);
    stopFallbackScanner();
    cameraSection.classList.remove('active');
    scanBtn.style.display = '';
    handleSBP(qrText);
  }

  function scanWithBarcodeDetector() {
    if (!fallbackActive || !barcodeDetector || videoEl.readyState < videoEl.HAVE_ENOUGH_DATA) return;

    barcodeDetector.detect(videoEl).then((codes) => {
      if (!fallbackActive) return;

      if (codes.length > 0) {
        const qrText = codes[0].rawValue;
        debugLog('[MINIAPP] BarcodeDetector QR detected: ' + qrText);
        onQrDetected(qrText);
      }
    }).catch((err) => {
      debugLog('[MINIAPP] BarcodeDetector error: ' + (err?.message || String(err)));
    });
  }

  function scanWithJsQr() {
    if (!fallbackActive || videoEl.readyState < videoEl.HAVE_ENOUGH_DATA) return;

    if (!fallbackCanvas) {
      fallbackCanvas = document.createElement('canvas');
      fallbackCtx = fallbackCanvas.getContext('2d', { willReadFrequently: true });
    }

    const width = videoEl.videoWidth;
    const height = videoEl.videoHeight;
    if (!width || !height) return;

    fallbackCanvas.width = width;
    fallbackCanvas.height = height;
    fallbackCtx.drawImage(videoEl, 0, 0, width, height);

    const originalImageData = fallbackCtx.getImageData(0, 0, width, height);

    let code = window.jsQR?.(originalImageData.data, width, height, {
      inversionAttempts: 'attemptBoth'
    });

    if (!code) {
      const grayscaleImageData = new ImageData(
        new Uint8ClampedArray(originalImageData.data),
        width,
        height
      );

      for (let i = 0; i < grayscaleImageData.data.length; i += 4) {
        const r = grayscaleImageData.data[i];
        const g = grayscaleImageData.data[i + 1];
        const b = grayscaleImageData.data[i + 2];
        const gray = 0.299 * r + 0.587 * g + 0.114 * b;

        grayscaleImageData.data[i] = gray;
        grayscaleImageData.data[i + 1] = gray;
        grayscaleImageData.data[i + 2] = gray;
      }

      code = window.jsQR?.(grayscaleImageData.data, width, height, {
        inversionAttempts: 'attemptBoth'
      });

      if (!code) {
        const thresholdImageData = new ImageData(
          new Uint8ClampedArray(grayscaleImageData.data),
          width,
          height
        );

        let totalGray = 0;
        let pixels = 0;

        for (let i = 0; i < thresholdImageData.data.length; i += 4) {
          totalGray += thresholdImageData.data[i];
          pixels++;
        }

        const averageGray = pixels ? totalGray / pixels : 128;
        const threshold = Math.max(90, Math.min(180, averageGray));

        for (let i = 0; i < thresholdImageData.data.length; i += 4) {
          const value = thresholdImageData.data[i] > threshold ? 255 : 0;
          thresholdImageData.data[i] = value;
          thresholdImageData.data[i + 1] = value;
          thresholdImageData.data[i + 2] = value;
        }

        code = window.jsQR?.(thresholdImageData.data, width, height, {
          inversionAttempts: 'attemptBoth'
        });
      }
    }

    if (code?.data) {
      console.log('[MINIAPP] jsQR detected:', code.data);
      debugLog('[MINIAPP] jsQR detected: ' + code.data);
      onQrDetected(code.data);
    }
  }

  function runTestPayment() {
    console.log('[MINIAPP] test button clicked');
    debugLog('[MINIAPP] test button clicked');
    handleSBP('https://qr.nspk.ru/AS100007CPLJIMJ0V89QO1HMG39NK1S5B');
  }

  async function runHealthCheck() {
    console.log('[MINIAPP] health check started');
    debugLog('[MINIAPP] health check started');

    try {
      debugLog('[MINIAPP] health url: ' + SERVER_URL + '/health');
      debugLog('[MINIAPP] using no-cors GET request for health');
      const resp = await fetch(SERVER_URL + '/health', {
        method: "GET",
        mode: "no-cors"
      });
      console.log(`[MINIAPP] health status: ${resp.status}`);
      debugLog(`[MINIAPP] health status: ${resp.status}`);

      const body = await resp.text();
      console.log(`[MINIAPP] health body: ${body}`);
      debugLog(`[MINIAPP] health body: ${body}`);
    } catch (err) {
      console.error('[MINIAPP] health error:', err);
      debugLog('[MINIAPP] health error: ' + (err?.message || String(err)));
    }
  }

  async function fallbackStartCameraScan() {
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: 'environment' } },
        audio: false
      });

      videoEl.srcObject = stream;
      await videoEl.play();

      fallbackActive = true;
      cameraSection.classList.add('active');
      videoWrapper.classList.add('scanning');
      scanBtn.style.display = 'none';
      idleSection.style.display = 'none';
      setStatus('Наведите камеру на QR-код СБП');

      debugLog('[MINIAPP] fallback camera started');
      debugLog('[MINIAPP] BarcodeDetector available: ' + (typeof window.BarcodeDetector !== 'undefined'));

      if (typeof window.BarcodeDetector !== 'undefined') {
        barcodeDetector = new window.BarcodeDetector({ formats: ['qr_code'] });
        scanBarcodeLoop();
      } else {
        barcodeDetector = null;
        debugLog('[MINIAPP] jsQR fallback active');
        scanLoop();
      }
    } catch (err) {
      debugLog('[MINIAPP] fallback camera error: ' + (err?.message || String(err)));
      setStatus('Не удалось открыть камеру: ' + (err?.message || 'unknown error'), 'error');
      stopFallbackScanner();
      cameraSection.classList.remove('active');
      scanBtn.style.display = '';
      idleSection.style.display = '';
    }
  }

  // Telegram QR scan
  function startScan() {
    const tg = window.Telegram?.WebApp;

    console.log('[MINIAPP] startScanning');
    debugLog('[MINIAPP] startScanning');

    resultCard.classList.remove('visible');
    idleSection.style.display = 'none';
    setStatus('Наведи на QR-код');
    debugLog('[MINIAPP] trying telegram scanner');

    if (!tg?.showScanQrPopup) {
      debugLog('[MINIAPP] telegram scanner unsupported');
      fallbackStartCameraScan();
      return;
    }

    try {
      debugLog('[MINIAPP] calling showScanQrPopup');
      tg.showScanQrPopup(
        { text: 'Наведи на QR-код' },
        (qrText) => {
          debugLog('[MINIAPP] showScanQrPopup callback: ' + qrText);
          console.log('[MINIAPP] QR detected:', qrText);
          debugLog('[MINIAPP] QR detected: ' + qrText);

          if (!qrText) return;

          tg.closeScanQrPopup?.();
          handleSBP(qrText);
        }
      );
    } catch (err) {
      debugLog('[MINIAPP] showScanQrPopup threw: ' + (err?.message || String(err)));
      debugLog('[MINIAPP] telegram scanner unsupported');
      fallbackStartCameraScan();
    }
  }

  function stopScanning() {
    tg?.closeScanQrPopup?.();
    stopFallbackScanner();
    cameraSection.classList.remove('active');
    scanBtn.style.display = '';
    idleSection.style.display = '';
    setStatus('Нажмите кнопку, чтобы начать сканирование');
  }

  // Payment logic
  async function handleSBP(url) {
    console.log(`[MINIAPP] handleSBP called: ${url}`);
    debugLog(`[MINIAPP] handleSBP called: ${url}`);

    try {
      debugLog('[MINIAPP] handleSBP entered');

      debugLog('[MINIAPP] before stopCameraKeepUI');
      try {
        stopCameraKeepUI();
      } catch (err) {
        console.error('[MINIAPP] stopCameraKeepUI error:', err);
        debugLog('[MINIAPP] stopCameraKeepUI error: ' + (err?.message || String(err)));
      }
      debugLog('[MINIAPP] after stopCameraKeepUI');

      try {
        setStatus('QR распознан. Отправка на сервер...');
      } catch (err) {
        console.error('[MINIAPP] setStatus error:', err);
        debugLog('[MINIAPP] setStatus error: ' + (err?.message || String(err)));
      }
      debugLog('[MINIAPP] after setStatus');

      try {
        setBtnLoading(true);
      } catch (err) {
        console.error('[MINIAPP] setBtnLoading error:', err);
        debugLog('[MINIAPP] setBtnLoading error: ' + (err?.message || String(err)));
      }
      debugLog('[MINIAPP] after setBtnLoading');

      debugLog('[MINIAPP] before fetch');
      console.log(`[MINIAPP] sending request: ${url}`);
      debugLog(`[MINIAPP] sending request: ${url}`);
      debugLog('[MINIAPP] payment url: ' + SERVER_URL + '/payment/pay');

      debugLog('[MINIAPP] using no-cors GET request for payment');
      const resp = await fetch(SERVER_URL + "/payment/pay?qr=" + encodeURIComponent(url), {
        method: "GET",
        mode: "no-cors"
      });

      console.log(`[MINIAPP] response status: ${resp.status}`);
      debugLog(`[MINIAPP] response status: ${resp.status}`);

      const data = await resp.json().catch(() => ({}));
      console.log(`[MINIAPP] response body: ${JSON.stringify(data)}`);
      debugLog(`[MINIAPP] response body: ${JSON.stringify(data)}`);

      if (resp.ok && data.paymentId) {
        try {
          showResult(url, true, 'Оплата запущена');
        } catch (err) {
          console.error('[MINIAPP] showResult success error:', err);
          debugLog('[MINIAPP] showResult success error: ' + (err?.message || String(err)));
        }

        try {
          setStatus('Оплата запущена', 'success');
        } catch (err) {
          console.error('[MINIAPP] setStatus success error:', err);
          debugLog('[MINIAPP] setStatus success error: ' + (err?.message || String(err)));
        }

        try {
          if (tg?.MainButton) {
            tg.MainButton.setText('Готово');
            tg.MainButton.show();
            tg.MainButton.onClick(() => tg.close());
          }
        } catch (err) {
          console.error('[MINIAPP] MainButton error:', err);
          debugLog('[MINIAPP] MainButton error: ' + (err?.message || String(err)));
        }
      } else {
        const errorMessage = data.error || 'Ошибка сервера';

        try {
          showResult(url, false, errorMessage);
        } catch (err) {
          console.error('[MINIAPP] showResult error error:', err);
          debugLog('[MINIAPP] showResult error error: ' + (err?.message || String(err)));
        }

        try {
          setStatus(errorMessage, 'error');
        } catch (err) {
          console.error('[MINIAPP] setStatus error state error:', err);
          debugLog('[MINIAPP] setStatus error state error: ' + (err?.message || String(err)));
        }
      }
    } catch (err) {
      console.error('[MINIAPP] handleSBP outer error:', err);
      debugLog('[MINIAPP] handleSBP outer error: ' + (err?.message || String(err)));

      try {
        showResult(url, false, 'Ошибка сети');
      } catch (innerErr) {
        console.error('[MINIAPP] showResult outer catch error:', innerErr);
        debugLog('[MINIAPP] showResult outer catch error: ' + (innerErr?.message || String(innerErr)));
      }

      try {
        setStatus('Ошибка сети', 'error');
      } catch (innerErr) {
        console.error('[MINIAPP] setStatus outer catch error:', innerErr);
        debugLog('[MINIAPP] setStatus outer catch error: ' + (innerErr?.message || String(innerErr)));
      }
    } finally {
      try {
        setBtnLoading(false);
      } catch (err) {
        console.error('[MINIAPP] setBtnLoading(false) error:', err);
        debugLog('[MINIAPP] setBtnLoading(false) error: ' + (err?.message || String(err)));
      }

      try {
        scanBtn.style.display = '';
        scanBtnText.textContent = 'Сканировать снова';
        idleSection.style.display = 'none';
      } catch (err) {
        console.error('[MINIAPP] final UI error:', err);
        debugLog('[MINIAPP] final UI error: ' + (err?.message || String(err)));
      }
    }
  }

  // Stop camera tracks but keep UI (for result display)
  function stopCameraKeepUI() {
    tg?.closeScanQrPopup?.();
    stopFallbackScanner();
    cameraSection.classList.remove('active');
  }

  // Init
  document.getElementById('scanBtn').onclick = startScan;
  setStatus('Нажмите кнопку, чтобы начать сканирование');
</script>
</body>
</html>
