<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Оплата по QR</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --tg-theme-bg-color: #ffffff;
      --tg-theme-text-color: #000000;
      --tg-theme-hint-color: #999999;
      --tg-theme-link-color: #2481cc;
      --tg-theme-button-color: #2481cc;
      --tg-theme-button-text-color: #ffffff;
      --tg-theme-secondary-bg-color: #f1f1f1;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--tg-theme-bg-color);
      color: var(--tg-theme-text-color);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0;
      overflow-x: hidden;
    }

    /* Header */
    .header {
      width: 100%;
      background-color: var(--tg-theme-secondary-bg-color);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid rgba(0,0,0,0.08);
    }

    .header-icon {
      width: 36px;
      height: 36px;
      background: var(--tg-theme-button-color);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .header-icon svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: #fff;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .header-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--tg-theme-text-color);
    }

    .header-subtitle {
      font-size: 13px;
      color: var(--tg-theme-hint-color);
    }

    /* Main content */
    .content {
      width: 100%;
      max-width: 480px;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      flex: 1;
    }

    /* Idle illustration */
    .illustration {
      width: 140px;
      height: 140px;
      background: var(--tg-theme-secondary-bg-color);
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 12px;
    }

    .illustration svg {
      width: 80px;
      height: 80px;
      opacity: 0.35;
    }

    .idle-text {
      text-align: center;
      color: var(--tg-theme-hint-color);
      font-size: 14px;
      line-height: 1.5;
      max-width: 260px;
    }

    /* Scan button */
    .scan-btn {
      width: 100%;
      max-width: 320px;
      padding: 15px 24px;
      background: var(--tg-theme-button-color);
      color: var(--tg-theme-button-text-color);
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: opacity 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .scan-btn:active {
      opacity: 0.8;
      transform: scale(0.98);
    }

    .scan-btn svg {
      width: 22px;
      height: 22px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }

    /* Camera section */
    .camera-section {
      display: none;
      width: 100%;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .camera-section.active {
      display: flex;
    }

    .video-wrapper {
      position: relative;
      width: 100%;
      max-width: 340px;
      aspect-ratio: 1 / 1;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.15);
      border: 3px solid var(--tg-theme-button-color);
      transition: border-color 0.3s;
    }

    .video-wrapper.scanning {
      border-color: #4cd964;
      box-shadow: 0 0 0 3px rgba(76, 217, 100, 0.25), 0 4px 24px rgba(0,0,0,0.15);
    }

    #camera-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Scan line animation */
    .scan-line {
      position: absolute;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, #4cd964, transparent);
      animation: scan 2s linear infinite;
      opacity: 0.8;
    }

    @keyframes scan {
      0%   { top: 5%; }
      50%  { top: 95%; }
      100% { top: 5%; }
    }

    /* Corner markers */
    .corner {
      position: absolute;
      width: 24px;
      height: 24px;
      border-color: var(--tg-theme-button-color);
      border-style: solid;
    }
    .corner.tl { top: 10px; left: 10px; border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
    .corner.tr { top: 10px; right: 10px; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
    .corner.bl { bottom: 10px; left: 10px; border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }
    .corner.br { bottom: 10px; right: 10px; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }

    .stop-btn {
      padding: 10px 24px;
      background: transparent;
      color: var(--tg-theme-hint-color);
      border: 1.5px solid var(--tg-theme-hint-color);
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .stop-btn:active { opacity: 0.7; }

    /* Status */
    .status {
      font-size: 14px;
      color: var(--tg-theme-hint-color);
      text-align: center;
      min-height: 20px;
      padding: 0 20px;
    }

    .status.success { color: #4cd964; font-weight: 600; }
    .status.error   { color: #ff3b30; font-weight: 600; }

    /* Result card */
    .result-card {
      display: none;
      width: 100%;
      max-width: 340px;
      background: var(--tg-theme-secondary-bg-color);
      border-radius: 16px;
      padding: 18px;
      gap: 14px;
      flex-direction: column;
    }

    .result-card.visible {
      display: flex;
    }

    .result-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--tg-theme-hint-color);
      font-weight: 600;
    }

    .result-url {
      font-size: 13px;
      color: var(--tg-theme-link-color);
      word-break: break-all;
      line-height: 1.4;
    }

    .result-divider {
      height: 1px;
      background: rgba(0,0,0,0.08);
    }

    .result-status-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .result-status-icon {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .result-status-icon.ok  { background: rgba(76, 217, 100, 0.15); }
    .result-status-icon.err { background: rgba(255, 59, 48, 0.12); }

    .result-status-text {
      font-size: 15px;
      font-weight: 600;
    }

    .result-status-text.ok  { color: #4cd964; }
    .result-status-text.err { color: #ff3b30; }

    #debug-log {
      max-height: 160px;
      overflow-y: auto;
      font-size: 12px;
      background: rgba(0,0,0,0.05);
      border-radius: 10px;
      padding: 8px;
      width: 100%;
      word-break: break-word;
    }

    /* Loading spinner */
    .spinner {
      display: none;
      width: 22px;
      height: 22px;
      border: 2.5px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-icon">
    <svg viewBox="0 0 24 24">
      <rect x="3" y="3" width="7" height="7" rx="1"/>
      <rect x="14" y="3" width="7" height="7" rx="1"/>
      <rect x="3" y="14" width="7" height="7" rx="1"/>
      <circle cx="17.5" cy="17.5" r="2"/>
      <line x1="14" y1="14" x2="14" y2="14.01"/>
      <line x1="20" y1="14" x2="20" y2="14.01"/>
      <line x1="14" y1="20" x2="14" y2="20.01"/>
    </svg>
  </div>
  <div>
    <div class="header-title">Оплата по QR</div>
    <div class="header-subtitle">Система быстрых платежей</div>
  </div>
</div>

<!-- Main content -->
<div class="content">

  <!-- Idle state -->
  <div id="idle-section">
    <div class="illustration">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="2" width="8" height="8" rx="1.5"/>
        <rect x="14" y="2" width="8" height="8" rx="1.5"/>
        <rect x="2" y="14" width="8" height="8" rx="1.5"/>
        <rect x="4.5" y="4.5" width="3" height="3" rx="0.5" fill="currentColor" stroke="none"/>
        <rect x="16.5" y="4.5" width="3" height="3" rx="0.5" fill="currentColor" stroke="none"/>
        <rect x="4.5" y="16.5" width="3" height="3" rx="0.5" fill="currentColor" stroke="none"/>
        <line x1="14" y1="14" x2="14" y2="22"/>
        <line x1="14" y1="14" x2="22" y2="14"/>
        <line x1="22" y1="18" x2="22" y2="22"/>
        <line x1="18" y1="22" x2="22" y2="22"/>
      </svg>
    </div>
    <p class="idle-text">Наведите камеру на QR-код СБП в магазине, чтобы быстро оплатить покупку</p>
  </div>

  <!-- Scan button -->
  <button class="scan-btn" id="scanBtn">
    <svg viewBox="0 0 24 24">
      <path d="M23 7V2h-5"/>
      <path d="M1 7V2h5"/>
      <path d="M23 17v5h-5"/>
      <path d="M1 17v5h5"/>
      <line x1="7" y1="12" x2="17" y2="12"/>
    </svg>
    <span id="scan-btn-text">Сканировать QR</span>
    <div class="spinner" id="btn-spinner"></div>
  </button>

  <!-- Camera section -->
  <div class="camera-section" id="camera-section">
    <div class="video-wrapper" id="video-wrapper">
      <video id="camera-video" autoplay muted playsinline></video>
      <div class="scan-line"></div>
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
    </div>
    <button class="stop-btn" onclick="stopScanning()">Отмена</button>
  </div>

  <!-- Status -->
  <div class="status" id="status-text">Нажмите кнопку, чтобы начать сканирование</div>

  <!-- Result card -->
  <div class="result-card" id="result-card">
    <div class="result-label">Найденная ссылка СБП</div>
    <div class="result-url" id="result-url"></div>
    <div class="result-divider"></div>
    <div class="result-status-row">
      <div class="result-status-icon" id="result-icon"></div>
      <div class="result-status-text" id="result-status-text"></div>
    </div>
  </div>

  <div id="debug-log"></div>

</div>

<script>
  // Telegram WebApp init
  const tg = window.Telegram?.WebApp;
  if (tg) {
    tg.ready();
    tg.expand?.();
  }
  debugLog('[MINIAPP] tg exists: ' + (!!tg));
  debugLog('[MINIAPP] tg version: ' + (tg?.version ?? 'undefined'));
  debugLog('[MINIAPP] tg platform: ' + (tg?.platform ?? 'undefined'));
  debugLog('[MINIAPP] typeof showScanQrPopup: ' + typeof tg?.showScanQrPopup);
  debugLog('[MINIAPP] typeof showAlert: ' + typeof tg?.showAlert);

  // Constants
  // заменить на актуальный URL backend (cloudflared)
  const SERVER_URL = 'https://break-issued-conversation-securities.trycloudflare.com';

  // DOM refs
  const scanBtn        = document.getElementById('scanBtn');
  const scanBtnText    = document.getElementById('scan-btn-text');
  const btnSpinner     = document.getElementById('btn-spinner');
  const cameraSection  = document.getElementById('camera-section');
  const statusText     = document.getElementById('status-text');
  const resultCard     = document.getElementById('result-card');
  const resultUrl      = document.getElementById('result-url');
  const resultIcon     = document.getElementById('result-icon');
  const resultStatus   = document.getElementById('result-status-text');
  const idleSection    = document.getElementById('idle-section');

  // UI helpers
  function setStatus(msg, cls = '') {
    statusText.textContent = msg;
    statusText.className = 'status ' + cls;
  }

  function debugLog(msg) {
    const el = document.getElementById('debug-log');
    if (!el) return;
    const row = document.createElement('div');
    row.textContent = msg;
    el.prepend(row);
  }

  function showResult(url, success, message) {
    resultUrl.textContent = url;
    resultCard.classList.add('visible');

    if (success) {
      resultIcon.className = 'result-status-icon ok';
      resultIcon.textContent = '✅';
      resultStatus.className = 'result-status-text ok';
      resultStatus.textContent = message;
    } else {
      resultIcon.className = 'result-status-icon err';
      resultIcon.textContent = '❌';
      resultStatus.className = 'result-status-text err';
      resultStatus.textContent = message;
    }
  }

  function setBtnLoading(loading) {
    btnSpinner.style.display = loading ? 'block' : 'none';
    scanBtnText.textContent  = loading ? 'Обработка...' : 'Сканировать снова';
    scanBtn.disabled         = loading;
  }

  // Telegram QR scan
  function startScan() {
    const tg = window.Telegram?.WebApp;

    console.log('[MINIAPP] startScanning');
    debugLog('[MINIAPP] startScanning');

    if (!tg) {
      debugLog('[MINIAPP] Telegram WebApp unavailable');
      alert('Telegram WebApp недоступен');
      return;
    }

    if (!tg.showScanQrPopup) {
      debugLog('[MINIAPP] showScanQrPopup unavailable');
      alert('Метод showScanQrPopup недоступен');
      return;
    }

    resultCard.classList.remove('visible');
    idleSection.style.display = 'none';
    setStatus('Наведи на QR-код');

    try {
      debugLog('[MINIAPP] calling showScanQrPopup');
      tg.showScanQrPopup(
        { text: 'Наведи на QR-код' },
        (qrText) => {
          debugLog('[MINIAPP] showScanQrPopup callback: ' + qrText);
          console.log('[MINIAPP] QR detected:', qrText);
          debugLog('[MINIAPP] QR detected: ' + qrText);

          if (!qrText) return;

          console.log('[MINIAPP] sending request');
          tg.closeScanQrPopup?.();
          handleSBP(qrText);
        }
      );
    } catch (err) {
      debugLog('[MINIAPP] showScanQrPopup threw: ' + (err?.message || String(err)));
    }
  }

  function stopScanning() {
    tg?.closeScanQrPopup?.();
    cameraSection.classList.remove('active');
    idleSection.style.display = '';
    setStatus('Нажмите кнопку, чтобы начать сканирование');
  }

  // Payment logic
  async function handleSBP(url) {
    console.log(`[MINIAPP] handleSBP called: ${url}`);
    debugLog('[MINIAPP] handleSBP');
    stopCameraKeepUI();
    setStatus('QR распознан. Отправка на сервер...');
    setBtnLoading(true);

    try {
      console.log('[MINIAPP] sending request');
      debugLog('[MINIAPP] sending request');
      const resp = await fetch(`${SERVER_URL}/payment/pay`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ qrUrl: url })
      });
      console.log(`[MINIAPP] response status: ${resp.status}`);
      debugLog('[MINIAPP] response ' + resp.status);

      const data = await resp.json().catch(() => ({}));

      if (resp.ok && data.paymentId) {
        showResult(url, true, 'Оплата запущена');
        setStatus('Оплата запущена', 'success');

        // Telegram MainButton
        if (tg?.MainButton) {
          tg.MainButton.setText('Готово');
          tg.MainButton.show();
          tg.MainButton.onClick(() => tg.close());
        }
      } else {
        const errorMessage = data.error || 'Ошибка сервера';
        showResult(url, false, errorMessage);
        setStatus(errorMessage, 'error');
      }
    } catch (err) {
      console.error('Payment error:', err);
      console.log('[MINIAPP] payment error');
      debugLog('[MINIAPP] network error');
      showResult(url, false, 'Ошибка сети');
      setStatus('Ошибка сети', 'error');
    }

    setBtnLoading(false);
    scanBtn.style.display = '';
    scanBtnText.textContent = 'Сканировать снова';
    idleSection.style.display = 'none';
  }

  // Stop camera tracks but keep UI (for result display)
  function stopCameraKeepUI() {
    tg?.closeScanQrPopup?.();
    cameraSection.classList.remove('active');
  }

  // Init
  document.getElementById('scanBtn').onclick = startScan;
  setStatus('Нажмите кнопку, чтобы начать сканирование');
</script>
</body>
</html>
