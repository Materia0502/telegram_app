<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Оплата по QR</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsqr/1.4.0/jsQR.min.js"></script>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --tg-theme-bg-color: #ffffff;
      --tg-theme-text-color: #000000;
      --tg-theme-hint-color: #999999;
      --tg-theme-link-color: #2481cc;
      --tg-theme-button-color: #2481cc;
      --tg-theme-button-text-color: #ffffff;
      --tg-theme-secondary-bg-color: #f1f1f1;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--tg-theme-bg-color);
      color: var(--tg-theme-text-color);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0;
      overflow-x: hidden;
    }

    /* ── Header ── */
    .header {
      width: 100%;
      background-color: var(--tg-theme-secondary-bg-color);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid rgba(0,0,0,0.08);
    }

    .header-icon {
      width: 36px;
      height: 36px;
      background: var(--tg-theme-button-color);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .header-icon svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: #fff;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .header-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--tg-theme-text-color);
    }

    .header-subtitle {
      font-size: 13px;
      color: var(--tg-theme-hint-color);
    }

    /* ── Main content ── */
    .content {
      width: 100%;
      max-width: 480px;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      flex: 1;
    }

    /* ── Idle illustration ── */
    .illustration {
      width: 140px;
      height: 140px;
      background: var(--tg-theme-secondary-bg-color);
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 12px;
    }

    .illustration svg {
      width: 80px;
      height: 80px;
      opacity: 0.35;
    }

    .idle-text {
      text-align: center;
      color: var(--tg-theme-hint-color);
      font-size: 14px;
      line-height: 1.5;
      max-width: 260px;
    }

    /* ── Scan button ── */
    .scan-btn {
      width: 100%;
      max-width: 320px;
      padding: 15px 24px;
      background: var(--tg-theme-button-color);
      color: var(--tg-theme-button-text-color);
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: opacity 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .scan-btn:active {
      opacity: 0.8;
      transform: scale(0.98);
    }

    .scan-btn svg {
      width: 22px;
      height: 22px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }

    /* ── Camera section ── */
    .camera-section {
      display: none;
      width: 100%;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .camera-section.active {
      display: flex;
    }

    .video-wrapper {
      position: relative;
      width: 100%;
      max-width: 340px;
      aspect-ratio: 1 / 1;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.15);
      border: 3px solid var(--tg-theme-button-color);
      transition: border-color 0.3s;
    }

    .video-wrapper.scanning {
      border-color: #4cd964;
      box-shadow: 0 0 0 3px rgba(76, 217, 100, 0.25), 0 4px 24px rgba(0,0,0,0.15);
    }

    #camera-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Scan line animation */
    .scan-line {
      position: absolute;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, #4cd964, transparent);
      animation: scan 2s linear infinite;
      opacity: 0.8;
    }

    @keyframes scan {
      0%   { top: 5%; }
      50%  { top: 95%; }
      100% { top: 5%; }
    }

    /* Corner markers */
    .corner {
      position: absolute;
      width: 24px;
      height: 24px;
      border-color: var(--tg-theme-button-color);
      border-style: solid;
    }
    .corner.tl { top: 10px; left: 10px; border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
    .corner.tr { top: 10px; right: 10px; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
    .corner.bl { bottom: 10px; left: 10px; border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }
    .corner.br { bottom: 10px; right: 10px; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }

    .stop-btn {
      padding: 10px 24px;
      background: transparent;
      color: var(--tg-theme-hint-color);
      border: 1.5px solid var(--tg-theme-hint-color);
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .stop-btn:active { opacity: 0.7; }

    /* ── Status ── */
    .status {
      font-size: 14px;
      color: var(--tg-theme-hint-color);
      text-align: center;
      min-height: 20px;
      padding: 0 20px;
    }

    .status.success { color: #4cd964; font-weight: 600; }
    .status.error   { color: #ff3b30; font-weight: 600; }

    /* ── Result card ── */
    .result-card {
      display: none;
      width: 100%;
      max-width: 340px;
      background: var(--tg-theme-secondary-bg-color);
      border-radius: 16px;
      padding: 18px;
      gap: 14px;
      flex-direction: column;
    }

    .result-card.visible {
      display: flex;
    }

    .result-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--tg-theme-hint-color);
      font-weight: 600;
    }

    .result-url {
      font-size: 13px;
      color: var(--tg-theme-link-color);
      word-break: break-all;
      line-height: 1.4;
    }

    .result-divider {
      height: 1px;
      background: rgba(0,0,0,0.08);
    }

    .result-status-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .result-status-icon {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .result-status-icon.ok  { background: rgba(76, 217, 100, 0.15); }
    .result-status-icon.err { background: rgba(255, 59, 48, 0.12); }

    .result-status-text {
      font-size: 15px;
      font-weight: 600;
    }

    .result-status-text.ok  { color: #4cd964; }
    .result-status-text.err { color: #ff3b30; }

    /* ── Loading spinner ── */
    .spinner {
      display: none;
      width: 22px;
      height: 22px;
      border: 2.5px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* hidden canvas for QR decoding */
    #qr-canvas { display: none; }
  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-icon">
    <svg viewBox="0 0 24 24">
      <rect x="3" y="3" width="7" height="7" rx="1"/>
      <rect x="14" y="3" width="7" height="7" rx="1"/>
      <rect x="3" y="14" width="7" height="7" rx="1"/>
      <circle cx="17.5" cy="17.5" r="2"/>
      <line x1="14" y1="14" x2="14" y2="14.01"/>
      <line x1="20" y1="14" x2="20" y2="14.01"/>
      <line x1="14" y1="20" x2="14" y2="20.01"/>
    </svg>
  </div>
  <div>
    <div class="header-title">Оплата по QR</div>
    <div class="header-subtitle">Система быстрых платежей</div>
  </div>
</div>

<!-- Main content -->
<div class="content">

  <!-- Idle state -->
  <div id="idle-section">
    <div class="illustration">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="2" width="8" height="8" rx="1.5"/>
        <rect x="14" y="2" width="8" height="8" rx="1.5"/>
        <rect x="2" y="14" width="8" height="8" rx="1.5"/>
        <rect x="4.5" y="4.5" width="3" height="3" rx="0.5" fill="currentColor" stroke="none"/>
        <rect x="16.5" y="4.5" width="3" height="3" rx="0.5" fill="currentColor" stroke="none"/>
        <rect x="4.5" y="16.5" width="3" height="3" rx="0.5" fill="currentColor" stroke="none"/>
        <line x1="14" y1="14" x2="14" y2="22"/>
        <line x1="14" y1="14" x2="22" y2="14"/>
        <line x1="22" y1="18" x2="22" y2="22"/>
        <line x1="18" y1="22" x2="22" y2="22"/>
      </svg>
    </div>
    <p class="idle-text">Наведите камеру на QR-код СБП в магазине, чтобы быстро оплатить покупку</p>
  </div>

  <!-- Scan button -->
  <button class="scan-btn" id="scan-btn" onclick="startScanning()">
    <svg viewBox="0 0 24 24">
      <path d="M23 7V2h-5"/>
      <path d="M1 7V2h5"/>
      <path d="M23 17v5h-5"/>
      <path d="M1 17v5h5"/>
      <line x1="7" y1="12" x2="17" y2="12"/>
    </svg>
    <span id="scan-btn-text">Сканировать QR</span>
    <div class="spinner" id="btn-spinner"></div>
  </button>

  <!-- Camera section -->
  <div class="camera-section" id="camera-section">
    <div class="video-wrapper" id="video-wrapper">
      <video id="camera-video" autoplay muted playsinline></video>
      <div class="scan-line"></div>
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
    </div>
    <button class="stop-btn" onclick="stopScanning()">Отмена</button>
  </div>

  <!-- Status -->
  <div class="status" id="status-text">Нажмите кнопку, чтобы начать сканирование</div>

  <!-- Result card -->
  <div class="result-card" id="result-card">
    <div class="result-label">Найденная ссылка СБП</div>
    <div class="result-url" id="result-url"></div>
    <div class="result-divider"></div>
    <div class="result-status-row">
      <div class="result-status-icon" id="result-icon"></div>
      <div class="result-status-text" id="result-status-text"></div>
    </div>
  </div>

</div>

<!-- Hidden canvas for QR decoding -->
<canvas id="qr-canvas"></canvas>

<script>
  // ── Telegram WebApp init ──────────────────────────────────────────
  const tg = window.Telegram?.WebApp;
  if (tg) {
    tg.ready();
    tg.expand();
  }

  // ── Constants ────────────────────────────────────────────────────
  const SERVER_URL = 'https://junction-defence-lloyd-juvenile.trycloudflare.com';
  const SBP_PATTERN = /qr\.nspk\.ru/i;
  const SCAN_INTERVAL_MS = 200;

  // ── State ────────────────────────────────────────────────────────
  let stream = null;
  let scanTimer = null;
  let scanning = false;

  // ── DOM refs ─────────────────────────────────────────────────────
  const scanBtn        = document.getElementById('scan-btn');
  const scanBtnText    = document.getElementById('scan-btn-text');
  const btnSpinner     = document.getElementById('btn-spinner');
  const cameraSection  = document.getElementById('camera-section');
  const videoEl        = document.getElementById('camera-video');
  const videoWrapper   = document.getElementById('video-wrapper');
  const canvas         = document.getElementById('qr-canvas');
  const ctx            = canvas.getContext('2d');
  const statusText     = document.getElementById('status-text');
  const resultCard     = document.getElementById('result-card');
  const resultUrl      = document.getElementById('result-url');
  const resultIcon     = document.getElementById('result-icon');
  const resultStatus   = document.getElementById('result-status-text');
  const idleSection    = document.getElementById('idle-section');

  // ── UI helpers ───────────────────────────────────────────────────
  function setStatus(msg, cls = '') {
    statusText.textContent = msg;
    statusText.className = 'status ' + cls;
  }

  function showResult(url, success, message) {
    resultUrl.textContent = url;
    resultCard.classList.add('visible');

    if (success) {
      resultIcon.className = 'result-status-icon ok';
      resultIcon.textContent = '✅';
      resultStatus.className = 'result-status-text ok';
      resultStatus.textContent = message;
    } else {
      resultIcon.className = 'result-status-icon err';
      resultIcon.textContent = '❌';
      resultStatus.className = 'result-status-text err';
      resultStatus.textContent = message;
    }
  }

  function setBtnLoading(loading) {
    btnSpinner.style.display = loading ? 'block' : 'none';
    scanBtnText.textContent  = loading ? 'Обработка...' : 'Сканировать снова';
    scanBtn.disabled         = loading;
  }

  // ── Camera helpers ───────────────────────────────────────────────
  async function startScanning() {
    // Reset result
    resultCard.classList.remove('visible');
    idleSection.style.display = 'none';
    setStatus('Запуск камеры…');
    scanBtn.disabled = true;
    scanning = false;

    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } },
        audio: false
      });
      videoEl.srcObject = stream;
      await videoEl.play();

      cameraSection.classList.add('active');
      scanBtn.style.display = 'none';
      setStatus('Наведите камеру на QR-код СБП');
      scanning = true;
      scanTimer = setInterval(scanFrame, SCAN_INTERVAL_MS);

    } catch (err) {
      console.error('Camera error:', err);
      scanBtn.disabled = false;
      idleSection.style.display = '';
      if (err.name === 'NotAllowedError') {
        setStatus('Нет доступа к камере. Разрешите доступ в настройках.', 'error');
      } else {
        setStatus('Не удалось открыть камеру: ' + err.message, 'error');
      }
    }
  }

  function stopScanning() {
    scanning = false;
    clearInterval(scanTimer);
    scanTimer = null;

    if (stream) {
      stream.getTracks().forEach(t => t.stop());
      stream = null;
    }
    videoEl.srcObject = null;
    cameraSection.classList.remove('active');
    videoWrapper.classList.remove('scanning');

    scanBtn.style.display = '';
    scanBtn.disabled = false;
    scanBtnText.textContent = 'Сканировать QR';
    btnSpinner.style.display = 'none';
    idleSection.style.display = '';
    setStatus('Нажмите кнопку, чтобы начать сканирование');
  }

  // ── QR scan loop ─────────────────────────────────────────────────
  function scanFrame() {
    if (!scanning || videoEl.readyState < videoEl.HAVE_ENOUGH_DATA) return;

    canvas.width  = videoEl.videoWidth;
    canvas.height = videoEl.videoHeight;
    ctx.drawImage(videoEl, 0, 0, canvas.width, canvas.height);

    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(imageData.data, imageData.width, imageData.height, {
      inversionAttempts: 'dontInvert'
    });

    if (code) {
      const found = code.data;
      console.log('QR detected:', found);

      if (SBP_PATTERN.test(found)) {
        // Valid SBP QR
        scanning = false;
        clearInterval(scanTimer);
        videoWrapper.classList.add('scanning');
        handleSBP(found);
      } else {
        setStatus('Это не QR-код СБП. Наведите на другой.', '');
      }
    }
  }

  // ── Payment logic ─────────────────────────────────────────────────
  async function handleSBP(url) {
    stopCameraKeepUI();
    setStatus('QR распознан. Отправка на сервер…');
    setBtnLoading(true);

    try {
      const resp = await fetch(`${SERVER_URL}/payment/pay`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ qrUrl: url })
      });

      if (resp.ok) {
        showResult(url, true, 'Оплата выполнена');
        setStatus('', 'success');

        // Telegram MainButton
        if (tg?.MainButton) {
          tg.MainButton.setText('Готово');
          tg.MainButton.show();
          tg.MainButton.onClick(() => tg.close());
        }
      } else {
        const body = await resp.text().catch(() => '');
        showResult(url, false, `Ошибка сервера (${resp.status})`);
        setStatus('Сервер вернул ошибку', 'error');
      }
    } catch (err) {
      console.error('Payment error:', err);
      showResult(url, false, 'Нет связи с сервером');
      setStatus('Ошибка сети', 'error');
    }

    setBtnLoading(false);
    scanBtn.style.display = '';
    scanBtnText.textContent = 'Сканировать снова';
    idleSection.style.display = 'none';
  }

  // Stop camera tracks but keep UI (for result display)
  function stopCameraKeepUI() {
    scanning = false;
    clearInterval(scanTimer);
    if (stream) {
      stream.getTracks().forEach(t => t.stop());
      stream = null;
    }
    videoEl.srcObject = null;
    cameraSection.classList.remove('active');
  }

  // ── Init ──────────────────────────────────────────────────────────
  setStatus('Нажмите кнопку, чтобы начать сканирование');
</script>
</body>
</html>
